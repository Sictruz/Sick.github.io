<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>To-Do Scrum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>To-Do List</h1>

  <div class="container">

    <input type="text" id="titulo" placeholder="Título da lista">

    <div class="input-area">
      <input type="text" id="tarefa" placeholder="Digite uma tarefa">
      <button onclick="adicionar()">Adicionar</button>
      <button onclick="limpar()">Limpar lista</button>
      <button onclick="copiarLista()">Copiar lista</button>
     
    </div>
   <div class="periodos">
  <button onclick="manha(this)">Manhã</button>
  <button onclick="tarde(this)">Tarde</button>
  <button onclick="noite(this)">Noite</button>
</div>
    <ul id="lista"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
